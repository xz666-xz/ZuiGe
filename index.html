<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>罪歌</title>
    <style>
        /* 整体样式居中，黑色背景，红色主色调 */
        body { 
            background: #000; 
            color: #ff4444; 
            text-align: center; 
            padding: 100px 20px; /* 左右加一点内边距，防止边缘太贴 */
            font-family: "微软雅黑", sans-serif; 
            margin: 0; /* 消除默认边距 */
        }
        /* 标题样式 */
        h1 { 
            font-size: 60px; 
            margin-bottom: 20px; /* 文字和图片之间加一点间距 */
        }
        /* 副标题样式 */
        p { 
            font-size: 20px; 
            color: #ccc; 
            margin-bottom: 30px; /* 文字和图片之间加一点间距 */
        }
        /* 图片样式 */
        img { 
            max-width: 100%; /* 自适应宽度 */
            height: auto;    /* 保持比例 */
            border-radius: 8px; /* 圆角 */
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.5); /* 加一点红色发光效果，更有氛围感 */
        }
    </style>
</head>
<body>
    <h1>罪歌</h1>
    <p>罪恶之歌喷蛆圣地</p>
    
    <!-- 修正后的图片标签：这里把 1.png.jpg 换成你实际上传的图片名 -->
    <img src="1.png.jpg" alt="罪歌展示图">
    
</body>
</html>
