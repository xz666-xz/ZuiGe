<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罪歌</title>
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 画布和粒子背景 */
        body { 
            background: #000; 
            color: #ff4444; 
            font-family: "微软雅黑", sans-serif; 
            text-align: center;
            padding: 60px 20px 100px; /* 底部留足空间给文字 */
            overflow: hidden; /* 隐藏滚动条 */
            position: relative;
        }
        
        /* 粒子画布 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; /* 放在最底层 */
        }

        /* 标题样式 */
        h1 {
            font-size: clamp(40px, 10vw, 80px); /* 自适应大小 */
            margin-bottom: 15px;
            text-shadow: 
                0 0 10px #ff4444,
                0 0 20px #ff4444,
                0 0 40px #ff4444;
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* 标题呼吸灯 */
        @keyframes glow {
            from { opacity: 0.8; text-shadow: 0 0 10px #ff4444; }
            to { opacity: 1; text-shadow: 0 0 20px #ff4444, 0 0 40px #ff2a6d; }
        }

        /* 副标题 */
        p.sub-title {
            font-size: clamp(16px, 3vw, 22px);
            color: #ccc;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* 图片容器 + 晃动效果 */
        .img-container {
            max-width: 80%;
            margin: 0 auto 50px;
            transition: transform 0.3s ease-out; /* 平滑过渡 */
        }
        .img-container:hover {
            transform: scale(1.02) rotate(1deg); /* 轻微放大+晃动 */
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
            display: block; /* 去空隙 */
        }

        /* 底部信息卡片 */
        .info-card {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 20px;
            max-width: 90%;
            margin: 0 auto;
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
        }

        .info-card h3 {
            margin-bottom: 15px;
            color: #fff;
            font-size: 20px;
        }

        .info-card p {
            color: #999;
            font-size: 16px;
            line-height: 1.6;
            margin: 5px 0;
        }

        .info-card .highlight {
            color: #ff4444;
            font-weight: bold;
        }
    </style>
    
    <!-- 引入粒子.js库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 粒子背景容器 -->
    <div id="particles-js"></div>

    <h1>罪歌</h1>
    <p class="sub-title">罪恶之歌喷蛆圣地</p>

    <div class="img-container">
        <img src="1.png.jpg" alt="罪歌">
    </div>

    <div class="info-card">
        <h3>罪歌有史以来都是一个和谐的家庭 欢迎每个人的加入</h3>
        <p>创始人：<span class="highlight">178729600</span> & <span class="highlight">1653430583</span></p>
        <p>喷蛆大神：<span class="highlight">泽狗 周子扬 小敏 李千雪</span></p>
    </div>

    <script>
        // 粒子配置
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ff4444" }, // 红色粒子
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff4444",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: false },
                    onclick: { enable: false },
                    resize: true
                }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
