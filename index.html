<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罪歌 - 科技背景版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('2.png.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ff4444;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            padding: 60px 20px 100px;
            position: relative;
            overflow: hidden;
        }

        /* 底层背景图 + 黑色透明蒙版 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.70);
            z-index: -2;
        }

        /* 科技感网格背景 */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(to right, rgba(255,68,68,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,68,68,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        h1 {
            font-size: clamp(40px, 10vw, 80px);
            margin-bottom: 15px;
            text-shadow: 0 0 15px #ff4444;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 3px;
        }

        @keyframes glow {
            from { opacity: 0.8; }
            to { opacity: 1; text-shadow: 0 0 20px #ff6666; }
        }

        p.sub-title {
            font-size: clamp(16px, 3vw, 22px);
            color: #ccc;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .img-container {
            max-width: 80%;
            margin: 0 auto 50px;
            transition: transform 0.3s ease;
        }
        .img-container:hover {
            transform: scale(1.02) rotate(1deg);
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
            border: 1px solid #ff4444;
            display: block;
        }

        .info-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 25px;
            max-width: 90%;
            margin: 0 auto;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.25);
        }

        .info-card h3 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 20px;
        }

        .info-card p {
            color: #eee;
            font-size: 16px;
            line-height: 1.6;
            margin: 8px 0;
        }

        .highlight {
            color: #ff4444;
            font-weight: bold;
            text-shadow: 0 0 6px currentColor;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <div class="content">
        <h1>罪歌</h1>
        <p class="sub-title">罪恶之歌喷蛆圣地</p>

        <div class="img-container">
            <img src="1.png.jpg" alt="罪歌">
        </div>

        <div class="info-card">
            <h3>罪歌有史以来都是一个和谐的家庭 欢迎每个人的加入</h3>
            <p>创始人：<span class="highlight">1653430583</span></p>
            <p>高层：<span class="highlight">泽狗 周子扬 小敏 李千雪 零雨</span></p>
        </div>
    </div>

    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: "#ff4444" },
                shape: { type: "circle" },
                opacity: { value: 0.3, random: true },
                size: { value: 2, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff4444",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    random: true,
                    out_mode: "out"
                }
            },
            interactivity: { events: { resize: true } }
        });
    </script>
</body>
</html>
