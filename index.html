<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罪歌 - 科技感</title>
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 画布与背景 */
        body { 
            background: #000; 
            color: #ff4444; 
            font-family: "微软雅黑", sans-serif; 
            text-align: center;
            padding: 60px 20px 100px; 
            position: relative;
            overflow: hidden;
        }

        /* 科技感线条背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255,68,68,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,68,68,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        /* 粒子画布 */
        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: -1;
        }

        /* 内容容器 */
        .content {
            position: relative;
            z-index: 1;
        }

        /* 标题与霓虹光效 */
        h1 {
            font-size: clamp(40px, 10vw, 80px);
            margin-bottom: 15px;
            text-shadow: 
                0 0 10px #ff4444,
                0 0 20px #ff4444,
                0 0 40px #ff4444;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 3px;
        }

        @keyframes glow {
            from { opacity: 0.8; }
            to { opacity: 1; text-shadow: 0 0 20px #ff6666, 0 0 40px #ff2a6d; }
        }

        /* 副标题 */
        p.sub-title {
            font-size: clamp(16px, 3vw, 22px);
            color: #ccc;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 图片容器 */
        .img-container {
            max-width: 80%;
            margin: 0 auto 50px;
            transition: transform 0.3s ease;
        }
        .img-container:hover {
            transform: scale(1.02) rotate(1deg);
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
            display: block;
            border: 1px solid #ff4444;
        }

        /* 信息卡片 - 科技感边框 */
        .info-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 25px;
            max-width: 90%;
            margin: 0 auto;
            backdrop-filter: blur(8px);
            box-shadow: 
                0 0 15px rgba(255, 68, 68, 0.3),
                inset 0 0 15px rgba(255, 68, 68, 0.1);
        }

        .info-card h3 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .info-card p {
            color: #eee;
            font-size: 16px;
            line-height: 1.6;
            margin: 8px 0;
        }

        .highlight {
            color: #ff4444;
            font-weight: bold;
            text-shadow: 0 0 5px currentColor;
        }
    </style>

    <!-- 粒子库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>

    <div class="content">
        <h1>罪歌</h1>
        <p class="sub-title">罪恶之歌喷蛆圣地</p>

        <div class="img-container">
            <img src="1.png.jpg" alt="罪歌">
        </div>

        <div class="info-card">
            <h3>罪歌有史以来都是一个和谐的家庭 欢迎每个人的加入</h3>
            <p>创始人：<span class="highlight">1653430583</span></p>
            <p>高层：<span class="highlight">泽狗 周子扬 小敏 李千雪 零雨</span></p>
        </div>
    </div>

    <script>
        // 粒子配置
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ff4444" },
                shape: { type: "circle" },
                opacity: { value: 0.4, random: true },
                size: { value: 2, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff4444",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_only: "canvas",
                events: { onhover: false, onclick: false, resize: true }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
